spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      password: ${REDIS_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update  # 첫 배포 후 validate로 변경

server:
  port: 8080
